[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "frontpage"
version = "0.1.2"
description = "The front page of your hedonic life — content discovery ranked by YOUR needs, not engagement"
readme = "README.md"
license = "MIT"
requires-python = ">=3.10"
authors = [
    { name = "AltPath AI", email = "hello@altpath.ai" },
]
dependencies = [
    "hedonics>=0.1.1",
    "fastmcp>=2.0",
]
keywords = [
    "feed",
    "hedonics",
    "discovery",
    "personalization",
    "well-being",
    "news",
    "research",
    "mcp",
]
classifiers = [
    "Development Status :: 2 - Pre-Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
]

[project.scripts]
frontpage = "frontpage.cli:main"

[project.urls]
Homepage = "https://github.com/altpath-ai/highnoon"
Repository = "https://github.com/altpath-ai/highnoon"
