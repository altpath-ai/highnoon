[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "mainstreet"
version = "0.1.1"
description = "Public policy hedonic assessment — evaluate whether policy serves Main Street's hedonic needs"
readme = "README.md"
license = "MIT"
requires-python = ">=3.10"
authors = [
    { name = "AltPath AI", email = "hello@altpath.ai" },
]
dependencies = [
    "hedonics>=0.1.1",
    "fastmcp>=2.0",
]
keywords = [
    "policy",
    "hedonics",
    "public-policy",
    "living-wage",
    "atus",
    "bls",
    "assessment",
    "mcp",
]
classifiers = [
    "Development Status :: 2 - Pre-Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
]

[project.scripts]
mainstreet = "mainstreet.cli:main"

[project.urls]
Homepage = "https://github.com/altpath-ai/highnoon"
Repository = "https://github.com/altpath-ai/highnoon"
